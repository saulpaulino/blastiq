// ===== GOOGLE SHEETS API =====
async function fetchSheet(apiKey,sheetId,name,range){
  if(!apiKey||!sheetId)return null;
  try{
    const r=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/${encodeURIComponent(name)}!${range}?key=${apiKey}`);
    if(!r.ok)throw new Error(r.status);
    return(await r.json()).values||[];
  }catch(e){console.error("Fetch sheet error:",e);return null;}
}

async function appendToSheet(apiKey,sheetId,sheetName,values){
  // Note: API Key alone can't write. We use a different approach.

  return values;

function parseProjects(rows){
  if(!rows||rows.length<2)return null;
  return rows.slice(1).map(r=>({

// ===== NEWS SCANNER ENGINE =====
async function scanNews(claudeKey, existingTitles){
  const searchQueries = [
    "licitación infraestructura República Dominicana 2026",
    "construcción carretera autopista República Dominicana",
    "cantera minería explosivos Dominicana",
    "presa hidroeléctrica proyecto Dominicana",
    "excavación obra pública Dominicana"
  ];
  
  // Use Claude with web search to find and analyze news
  const prompt = `Busca noticias recientes sobre proyectos de infraestructura en República Dominicana que podrían requerir servicios de explosivos comerciales (voladuras, excavación en roca, canteras, túneles, presas, carreteras con cortes de montaña, minería).

Para cada proyecto relevante que encuentres, genera un objeto JSON. Responde SOLO con un array JSON puro sin markdown ni backticks. Formato de cada objeto:
{"id":"PRJ-2026-${String(Date.now()).slice(-3)}","titulo":"nombre del proyecto","fuente":"Fuente de la noticia","tipo":"Carreteras|Hidroeléctrica|Metro/Túnel|Minería|Industrial|Portuario|Transporte|Otro","region":"Norte|Sur|Este|Oeste|DN|Noroeste|Noreste|Suroeste|Sureste","provincia":"nombre provincia","valor_estimado":0,"prob_voladura":85,"fecha_deteccion":"${new Date().toISOString().split('T')[0]}","inicio_estimado":"2026-XX","status":"detectado","descripcion":"descripción breve del proyecto","señales":"señal1; señal2; señal3","competidores":"competidor1; competidor2","ai_insight":"recomendación estratégica para empresa de explosivos","prioridad":"critical|high|medium|low","contacto":"entidad responsable","url_fuente":"url si disponible","ultima_actualizacion":"${new Date().toISOString()}"}

IMPORTANTE:
- Solo incluye proyectos que genuinamente podrían necesitar explosivos o voladura
- Asigna prob_voladura realista (0-100) basado en el tipo de obra
- No incluyas proyectos que ya estén en esta lista: ${existingTitles.join(", ")}
- Si no encuentras noticias relevantes nuevas, responde: []
- Responde SOLO el array JSON, nada más`;

  try {
    const PROXY_URL = "https://yellow-paper-dc25.saulpaulino8.workers.dev";
    const res = await fetch(PROXY_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        apiKey: claudeKey,
        model: "claude-sonnet-4-20250514",
        max_tokens: 4000,
        tools: [{type: "web_search_20250305", name: "web_search"}],
        messages: [{role: "user", content: prompt}]
      })
    });

    if (!res.ok) {
      const err = await res.text();
      throw new Error(`API ${res.status}: ${err}`);
    }

    const data = await res.json();
    
    // Extract text from response (may have multiple content blocks due to tool use)
    let fullText = "";
    for (const block of data.content) {
      if (block.type === "text") {
        fullText += block.text;
      }
    }
    
    // Parse JSON from response
    const cleaned = fullText.replace(/```json\n?/g, "").replace(/```\n?/g, "").trim();
    
    // Try to find array in the text
    const arrayMatch = cleaned.match(/\[[\s\S]*\]/);
    if (arrayMatch) {
      const parsed = JSON.parse(arrayMatch[0]);
      return { success: true, projects: parsed, raw: fullText };
    }
    
    // If empty result
    if (cleaned === "[]") {
      return { success: true, projects: [], raw: fullText };
    }
    
    // Try parsing as single object
    const objMatch = cleaned.match(/\{[\s\S]*\}/);
    if (objMatch) {
      const parsed = JSON.parse(objMatch[0]);
      return { success: true, projects: parsed.relevante === false ? [] : [parsed], raw: fullText };
    }

    return { success: true, projects: [], raw: fullText };
  } catch (err) {
    return { success: false, error: err.message, projects: [] };
  }
}

// ===== SCANNER COMPONENT =====
function Scanner({claudeKey, projects, onNewProjects}){
  const[scanning,setScanning]=useState(false);
  const[log,setLog]=useState([]);
  const[found,setFound]=useState([]);
  const[autoEnabled,setAutoEnabled]=useState(false);
  const intervalRef=useRef(null);
  
  const addLog=(msg,type="info")=>setLog(prev=>[{msg,type,time:new Date().toLocaleTimeString("es-DO",{hour:"2-digit",minute:"2-digit",second:"2-digit"})},...prev].slice(0,50));

  const runScan=useCallback(async()=>{
    if(scanning||!claudeKey)return;
    setScanning(true);
    addLog("Iniciando escaneo de noticias...","scan");
    addLog("Buscando: infraestructura, licitaciones, canteras, presas, carreteras RD","search");
    
    const existingTitles=projects.map(p=>p.title);
    const result=await scanNews(claudeKey,existingTitles);
    
    if(result.success){
      if(result.projects.length>0){
        addLog(`✅ ${result.projects.length} proyecto(s) nuevo(s) detectado(s)`,"success");
        const newProjects=result.projects.map(p=>({
          ...p,
          estimatedValue:p.valor_estimado||0,
          blastingProbability:p.prob_voladura||50,
          province:p.provincia||"",
          contactLead:p.contacto||"",
          signals:typeof p.señales==="string"?p.señales.split(";").map(s=>s.trim()).filter(Boolean):p.señales||[],
          competitors:typeof p.competidores==="string"?p.competidores.split(";").map(s=>s.trim()).filter(Boolean):p.competidores||[],
          aiInsight:p.ai_insight||"",
          detectedDate:p.fecha_deteccion||new Date().toISOString().split("T")[0],
          estimatedStart:p.inicio_estimado||"",
          source:p.fuente||"Scanner AI"
        }));
        setFound(prev=>[...newProjects,...prev]);
        onNewProjects(newProjects);
        newProjects.forEach(p=>addLog(`→ ${p.titulo}: ${p.tipo} | ${p.provincia} | Voladura: ${p.prob_voladura||p.blastingProbability}%`,"project"));
      }else{
        addLog("No se encontraron proyectos nuevos relevantes","info");
      }
    }else{
      addLog(`❌ Error: ${result.error}`,"error");
    }
    
    addLog("Escaneo completado","scan");
    setScanning(false);
  },[claudeKey,projects,scanning,onNewProjects]);

  // Auto scan
  useEffect(()=>{
    if(autoEnabled&&claudeKey){
      addLog("⏰ Auto-escaneo activado: cada 4 horas","auto");
      intervalRef.current=setInterval(runScan,4*60*60*1000);
      return()=>clearInterval(intervalRef.current);
    }else{
      if(intervalRef.current)clearInterval(intervalRef.current);
    }
  },[autoEnabled,claudeKey]);

  const logColors={info:C.txM,scan:C.acc,search:C.md,success:C.ok,error:C.cr,project:C.hi,auto:C.md};

  return React.createElement("div",{style:{animation:"slideIn .3s ease",height:"100%",display:"flex",flexDirection:"column"}},
    // Header
    React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}},
      React.createElement("div",null,
        React.createElement("h2",{style:{fontSize:14,fontWeight:700,fontFamily:F.h,color:C.tx,marginBottom:4}},"Escáner de Noticias AI"),

        // Auto toggle
        React.createElement("div",{onClick:()=>claudeKey&&setAutoEnabled(!autoEnabled),style:{display:"flex",alignItems:"center",gap:8,padding:"8px 14px",background:autoEnabled?C.okBg:C.bg,border:`1px solid ${autoEnabled?C.ok+"44":C.brd}`,borderRadius:8,cursor:claudeKey?"pointer":"not-allowed",opacity:claudeKey?1:.4}},
          React.createElement("div",{style:{width:36,height:20,borderRadius:10,background:autoEnabled?C.ok:C.brd,display:"flex",alignItems:"center",padding:2,justifyContent:autoEnabled?"flex-end":"flex-start",transition:"all .2s"}},
            React.createElement("div",{style:{width:16,height:16,borderRadius:"50%",background:"#fff",transition:"all .2s"}})
          ),
          React.createElement("span",{style:{fontSize:11,fontFamily:F.m,color:autoEnabled?C.ok:C.txM}},"Auto 4h")
        ),
        // Scan button
        React.createElement("button",{onClick:runScan,disabled:scanning||!claudeKey,style:{background:scanning?"transparent":C.acc,border:scanning?`2px solid ${C.acc}`:"2px solid transparent",borderRadius:10,padding:"10px 24px",fontSize:13,fontWeight:700,color:scanning?C.acc:C.bg,fontFamily:F.m,cursor:scanning||!claudeKey?"not-allowed":"pointer",display:"flex",alignItems:"center",gap:8,animation:scanning?"scanPulse 2s infinite":"none",opacity:claudeKey?1:.4}},
          scanning&&React.createElement("span",{style:{display:"inline-flex",animation:"spin 1s linear infinite"}},"⟳"),
          scanning?"ESCANEANDO...":"⚡ ESCANEAR AHORA"
        )

    found.length>0&&React.createElement("div",{style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:16}},

function AIChat({projects,claudeKey}){

  const send=useCallback(async()=>{
    if(!inp.trim()||loading)return;
    const txt=inp.trim();setInp("");
    setMsgs(p=>[...p,{role:"user",content:txt}]);setLoading(true);
    try{
      if(!claudeKey)throw new Error("No API key");
      const ctx=projects.slice(0,6).map(p=>`- ${p.title}|${p.type}|${p.province}|${fmt(p.estimatedValue)}|Vol:${p.blastingProbability}%|${p.priority}`).join("\n");
      const PROXY_URL="https://yellow-paper-dc25.saulpaulino8.workers.dev";

        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({apiKey:claudeKey,model:"claude-sonnet-4-20250514",max_tokens:1000,
          system:`Eres analista experto de mercado para empresa de explosivos en RD. Pipeline actual:\n${ctx}\nCompetencia: MAXAM 35%, Expl.Caribe 25%, Austin 15%, Nosotros 18%. Revenue trending $45K→$95K. Win rate 86%. Responde en español, conciso y accionable.`,

        })});
